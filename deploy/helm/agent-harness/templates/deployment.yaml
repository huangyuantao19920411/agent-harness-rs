apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agent
  namespace: {{ .Values.sandbox.namespace }}
  labels:
    app: agent-harness
spec:
  replicas: {{ .Values.agent.replicas }}
  selector:
    matchLabels:
      app: agent-harness
  template:
    metadata:
      labels:
        app: agent-harness
    spec:
      containers:
        - name: agent
          image: {{ .Values.agent.image }}
          env:
            - name: SANDBOX_RUNTIME_CLASS
              value: {{ .Values.sandbox.runtimeClass | quote }}
            - name: SANDBOX_NAMESPACE
              value: {{ .Values.sandbox.namespace | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Values.sandbox.namespace }}
  labels:
    app: agent-harness
